version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: task_manager_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-task_manager}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - task_manager_net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_manager_api_prod
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - static_volume:/app/staticfiles
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      DEBUG: 'False'
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-task_manager}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - task_manager_net

  nginx:
    image: nginx:alpine
    container_name: task_manager_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - task_manager_net

volumes:
  postgres_data_prod:
  static_volume:

networks:
  task_manager_net:
    driver: bridge
